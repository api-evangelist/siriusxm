  rating: 1
  summary: SiriusXM does not offer a public developer API. The company provides satellite radio and streaming music services through subscription plans and automotive OEM partnerships. An unofficial community API (xmplaylist.com) exists for channel metadata but is not officially affiliated. The internal REST API at player.siriusxm.com is private and undocumented. For business integrations, contact SiriusXM directly.
